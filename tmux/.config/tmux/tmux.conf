# omakase-mac — Tmux configuration
# Managed via GNU Stow. Plugins via TPM (installed by install.sh).

# --- Terminal / colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -sg escape-time 0                        # no delay for ESC (Neovim responsiveness)
set -g focus-events on
set -g history-limit 50000

# --- Extended keys ---
# Pass through modified keys (Shift+Enter, Ctrl+Enter, etc.) to TUIs like
# Claude Code and Neovim. Without this, tmux collapses Shift+Enter to a plain
# Enter. Ghostty encodes these via the kitty keyboard protocol.
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features '*:extkeys'

# --- General ---
set -g mouse on
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                    # panes start at 1
set -g renumber-windows on                   # keep window numbers gapless
set -g set-clipboard on                      # sync copy to system clipboard

# --- Prefix: Ctrl-Space (frees Ctrl-a and Ctrl-b) ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Splits: keep current path, intuitive keys ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vi-style pane navigation ---
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Kill session (Prefix + Shift-K) ---
# detach-on-destroy is on by default, so killing the last session drops you
# back to the plain shell; otherwise it switches you to another session.
bind K confirm-before -p "Kill session '#S'? (y/n) " kill-session

# --- Vi copy mode (system clipboard via pbcopy) ---
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Catppuccin theme
set -g @catppuccin_flavour 'mocha'

# Initialize TPM (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# --- Prefix indicator ---
# Appended AFTER tpm so catppuccin doesn't overwrite it. Shows a bold badge on
# the right of the status bar only while the prefix is "armed".
set -ga status-right "#{?client_prefix,#[fg=black#,bg=colour211#,bold] PREFIX #[default],}"
