# omakase-mac — AeroSpace (i3-like tiling WM) configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace at login.
start-at-login = true

# Normalizations keep the tree tidy.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout for new workspaces.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when switching monitors/windows.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps (Omarchy-style breathing room).
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# --- Main mode bindings (alt = primary modifier, i3-style) ---
[mode.main.binding]

# Launch terminal — open a NEW Ghostty window (⌘N if already running, else launch).
alt-enter = '''exec-and-forget osascript -e '
if application "Ghostty" is running then
    tell application "Ghostty" to activate
    delay 0.05
    tell application "System Events" to keystroke "n" using {command down}
else
    tell application "Ghostty" to activate
end if
' '''

# App launchers (alt = primary modifier, matching the WM bindings)
alt-o = 'exec-and-forget open -a "Obsidian"'
alt-b = 'exec-and-forget open -a "Google Chrome"'

# End-of-session: politely quit every foreground app (so background apps don't
# get resurrected on the home screen after sleep/wake). Sends a normal quit, so
# apps with unsaved work will still prompt. Finder is skipped; AeroSpace itself
# is an accessory process and is excluded by the `background only is false` filter.
alt-shift-q = '''exec-and-forget osascript -e '
tell application "System Events"
    set theApps to name of every application process whose background only is false
end tell
repeat with anApp in theApps
    if anApp is not "Finder" then
        try
            tell application anApp to quit
        end try
    end if
end repeat
' '''

# Focus movement
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Layouts
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'

# Toggle floating / tiling for focused window
alt-shift-space = 'layout floating tiling'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move focused window to workspace (and follow it there)
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

# Quick switch to previously focused workspace
alt-tab = 'workspace-back-and-forth'

# Enter service mode (reload, reset layout, etc.)
alt-shift-semicolon = 'mode service'

# --- Service mode ---
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']   # reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
